# OpenTofu CI/CD
#
# Pull requests  → validate only (no secrets, no state)
# Push to master → plan → manual approval → apply
#
# Required secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   TF_STATE_BUCKET, TF_STATE_LOCK_TABLE  (passed as -backend-config; no profile in backend.tf)
#   TF_VARS  — full terraform.tfvars (aws_profile is stripped automatically)

name: OpenTofu

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tofu-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AWS_REGION: us-east-1
  TF_INPUT: "false"

jobs:
  # ── Validate ──────────────────────────────────────────────────────────────────
  # Runs on every PR and master push. No secrets, no backend.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Init (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  # ── Plan ──────────────────────────────────────────────────────────────────────
  # Master only. Output is visible in the Actions run — review it before approving apply.
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: |
          echo "$TF_VARS" > terraform.tfvars
          # CI authenticates via environment variables, not a named profile.
          sed -i '/^\s*aws_profile/d' terraform.tfvars

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Plan
        run: |
          set -o pipefail
          # ANSI output renders natively in the Actions live log
          tofu plan 2>&1 | tee plan.ansi
          # Strip colours for the step summary diff block
          sed 's/\x1b\[[0-9;]*m//g' plan.ansi > plan.txt

      - name: Post plan to step summary
        if: always()
        run: |
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cat plan.txt  >> $GITHUB_STEP_SUMMARY
          echo '```'    >> $GITHUB_STEP_SUMMARY

  # ── Apply ──────────────────────────────────────────────────────────────────────
  # Requires manual approval via the "production" environment.
  # Review the plan output in the preceding job before approving.
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: |
          echo "$TF_VARS" > terraform.tfvars
          # CI authenticates via environment variables, not a named profile.
          sed -i '/^\s*aws_profile/d' terraform.tfvars

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Apply
        run: tofu apply -auto-approve
