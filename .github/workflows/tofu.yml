# OpenTofu CI/CD
#
# Triggered two ways:
#   workflow_run (PR Checks completes) → plan with real state, post comment to PR
#   push to master                     → plan + apply (approval-gated)
#
# Secrets are NEVER present on PR runners (pr.yml has none).
# This workflow always runs from the master branch, so its YAML cannot be
# tampered with via a PR — the standard GitHub-recommended pattern.
#
# Required secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   TF_STATE_BUCKET, TF_STATE_LOCK_TABLE
#   TF_VARS  — full terraform.tfvars (omit aws_profile; CI uses env-var creds)

name: OpenTofu

on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["PR Checks"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: tofu-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_INPUT: "false"

jobs:
  # ── Plan (PR comment) ────────────────────────────────────────────────────────
  # Runs when a PR's validate job succeeds. Checks out the PR's head SHA,
  # plans with real state + secrets, posts result as a PR comment.
  plan-pr:
    name: Plan (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
    steps:
      - name: Download PR metadata
        uses: actions/download-artifact@v4
        with:
          name: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read PR metadata
        id: pr
        run: |
          echo "number=$(cat pr-number.txt)" >> "$GITHUB_OUTPUT"
          echo "sha=$(cat head-sha.txt)"     >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Plan
        id: plan
        run: |
          set -o pipefail
          tofu plan -no-color 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PLAN_EXIT: ${{ steps.plan.outputs.exit_code }}
        with:
          script: |
            const fs       = require('fs');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const exitCode = process.env.PLAN_EXIT;
            const raw      = fs.readFileSync('plan.txt', 'utf8');
            const max      = 65000;
            const out      = raw.length > max
              ? raw.slice(0, max) + '\n\n…output truncated, see full logs'
              : raw;
            const status   = exitCode === '0' ? '✅' : '❌';
            const marker   = '<!-- tofu-plan -->';
            const body     = `${marker}\n### ${status} OpenTofu Plan\n\`\`\`\n${out}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            for (const c of comments.filter(c => c.body.includes(marker))) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id,
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber, body,
            });

            if (exitCode !== '0') core.setFailed('Plan failed');

  # ── Plan (master) ────────────────────────────────────────────────────────────
  plan-master:
    name: Plan (master)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Plan
        run: |
          set -o pipefail
          tofu plan -no-color 2>&1 | tee plan.txt

  # ── Apply ────────────────────────────────────────────────────────────────────
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan-master
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Apply
        run: tofu apply -auto-approve
