# OpenTofu CI/CD
#
# Pull requests  → validate only (no secrets, no state)
# Push to master → plan → manual approval → apply
#
# Required secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   TF_STATE_BUCKET, TF_STATE_LOCK_TABLE
#   TF_VARS  — full terraform.tfvars (omit aws_profile; CI uses env-var creds)

name: OpenTofu

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tofu-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AWS_REGION: us-east-1
  TF_INPUT: "false"

jobs:
  # ── Validate ──────────────────────────────────────────────────────────────────
  # Runs on every PR and master push. No secrets, no backend.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Init (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  # ── Plan ──────────────────────────────────────────────────────────────────────
  # Master only. Output is visible in the Actions run — review it before approving apply.
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Plan
        run: |
          set -o pipefail
          tofu plan -no-color 2>&1 | tee plan.txt

  # ── Apply ──────────────────────────────────────────────────────────────────────
  # Requires manual approval via the "production" environment.
  # Review the plan output in the preceding job before approving.
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Apply
        run: tofu apply -auto-approve
