# OpenTofu CI/CD
#
# Pull requests  → validate only (no secrets, no state)
# Push to master → plan → manual approval → apply (saved plan)
#
# Required secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   TF_STATE_BUCKET, TF_STATE_LOCK_TABLE  (passed as -backend-config; no profile in backend.tf)
#   TF_VARS  — full terraform.tfvars (aws_profile is stripped automatically)
#
# Manual approval:
#   Go to Settings → Environments → production → add yourself as a required reviewer.
#   The apply job will pause there; click the plan summary link to review before approving.

name: OpenTofu

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tofu-${{ github.ref }}
  cancel-in-progress: true  # Cancel pending workflows on new push, ensuring latest code is always tested/planned

env:
  AWS_REGION: us-east-1
  TF_INPUT: "false"

jobs:
  # ── Validate ──────────────────────────────────────────────────────────────────
  # Runs on every PR and master push. No secrets, no backend.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Init (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  # ── Plan ──────────────────────────────────────────────────────────────────────
  # Saves a binary plan file and posts the human-readable diff to the job
  # summary so reviewers can read it before approving the apply.
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: |
          echo "$TF_VARS" > terraform.tfvars
          # CI authenticates via environment variables, not a named profile.
          sed -i '/^\s*aws_profile/d' terraform.tfvars

      - name: Cache providers
        uses: actions/cache@v4
        with:
          path: .terraform/providers
          key: tofu-providers-${{ runner.os }}-${{ hashFiles('.terraform.lock.hcl') }}

      - name: Init
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Plan
        run: |
          set -o pipefail
          # script -q fakes a PTY so tofu keeps ANSI colours; GH Actions renders them natively.
          script -q -e -c "tofu plan -out=tfplan 2>&1" /dev/null | tee plan.ansi

      - name: Post plan to step summary
        if: always()
        run: |
          [ -f plan.ansi ] || exit 0
          {
            echo '```diff'
            sed 's/\x1b\[[0-9;]*m//g' plan.ansi \
              | sed 's/arn:aws:iam::[0-9]*:[^"[:space:]]*/[REDACTED]/g'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            tfplan
            .terraform.lock.hcl
            .terraform/modules
            .terraform/providers
          retention-days: 7

  # ── Apply ──────────────────────────────────────────────────────────────────────
  # Pauses for manual approval (configure required reviewers on the "production"
  # environment in Settings → Environments). Applies the exact binary plan that
  # was reviewed — no re-plan, no drift between approval and execution.
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: |
          echo "$TF_VARS" > terraform.tfvars
          sed -i '/^\s*aws_profile/d' terraform.tfvars

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Init (re-use cached providers)
        run: tofu init
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Apply
        run: tofu apply -auto-approve tfplan
